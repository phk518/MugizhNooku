<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>MugizhNokku CesiumJS</title>

  <script>
    window.CESIUM_BASE_URL = "https://cesium.com/downloads/cesiumjs/releases/1.114/Build/Cesium/";
  </script>
  <script src="https://cesium.com/downloads/cesiumjs/releases/1.114/Build/Cesium/Cesium.js"></script>
  <link
    href="https://cesium.com/downloads/cesiumjs/releases/1.114/Build/Cesium/Widgets/widgets.css"
    rel="stylesheet"
  />

  <style>
    html, body, #cesiumContainer {
      width: 100%;
      height: 100%;
      margin: 0;
      padding: 0;
      overflow: hidden;
      background: #000;
    }

    #cesiumContainer {
      position: relative;
    }

    #info {
      position: absolute;
      top: 10px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0, 0, 0, 0.72);
      color: #fff;
      padding: 8px 14px;
      border-radius: 999px;
      font-family: system-ui, sans-serif;
      font-size: 13px;
      z-index: 99;
      backdrop-filter: blur(6px);
      pointer-events: none;
      white-space: nowrap;
    }

    #status {
      position: absolute;
      bottom: 10px;
      left: 10px;
      color: rgba(255, 255, 255, 0.9);
      background: rgba(0, 0, 0, 0.45);
      padding: 6px 10px;
      border-radius: 8px;
      font-family: system-ui, sans-serif;
      font-size: 12px;
      z-index: 99;
      max-width: calc(100% - 20px);
      pointer-events: none;
    }

    .cesium-viewer-toolbar,
    .cesium-viewer-animationContainer,
    .cesium-viewer-timelineContainer,
    .cesium-viewer-bottom {
      display: none !important;
    }
  </style>
</head>
<body>
  <div id="cesiumContainer">
    <div id="info">🌧️ முகில்நோக்கு · ConvLSTM T+1 Rainfall Forecast (mm)</div>
    <div id="status">Loading rainfall forecast…</div>
  </div>

  <script>
    Cesium.buildModuleUrl.setBaseUrl(window.CESIUM_BASE_URL);
    
    // CRITICAL: We MUST disable web workers because Streamlit components.html executes in a sandboxed iframe with a 'null' origin.
    // Modern browsers strictly forbid instantiating WebWorkers from a null origin (SecurityError).
    // If we do not disable this, Cesium crashes instantly and you get a black screen ("no earth").
    // DO NOT REMOVE THIS LINE.
    Cesium.FeatureDetection.supportsWebWorkers = function() { return false; };

    const viewer = new Cesium.Viewer("cesiumContainer", {
      animation: false,
      timeline: false,
      fullscreenButton: false,
      baseLayerPicker: false,
      homeButton: false,
      sceneModePicker: false,
      navigationHelpButton: false,
      geocoder: false,
      selectionIndicator: false,
      infoBox: true,
      imageryProvider: new Cesium.UrlTemplateImageryProvider({
        url: "https://services.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}",
        credit: "Esri World Imagery"
      })
    });

    viewer.scene.globe.depthTestAgainstTerrain = true;
    viewer.scene.globe.enableLighting = true;
    viewer.scene.postProcessStages.fxaa.enabled = true;

    const statusEl = document.getElementById("status");
    const injectedTexture = `/*_INJECT_TEXTURE_*/`;
    const injectedData = `/*_INJECT_DATA_*/`;

    function safeNum(value, fallback) {
      const n = Number(value);
      return Number.isFinite(n) ? n : fallback;
    }

    function safeColor(p) {
      const r = Math.max(0, Math.min(255, safeNum(p.r, 0)));
      const g = Math.max(0, Math.min(255, safeNum(p.g, 180)));
      const b = Math.max(0, Math.min(255, safeNum(p.b, 255)));
      return Cesium.Color.fromBytes(r, g, b, 220);
    }

    function cylinderLength(rainMm, rawHeight) {
      const rain = safeNum(rainMm, 0);
      const h = safeNum(rawHeight, rain * 500);
      return Math.max(100, Math.min(h, 800000));
    }

    function cylinderBottomRadius(rainMm) {
      const rain = Math.max(0, safeNum(rainMm, 0));
      return Math.max(2500, Math.min(2500 + rain * 250, 18000));
    }

    function parsePoints() {
      if (!injectedData || injectedData === "/*_INJECT_DATA_*/") return [];
      try {
        const parsed = JSON.parse(injectedData);
        return Array.isArray(parsed) ? parsed : [];
      } catch (err) {
        statusEl.textContent = "Invalid injected rainfall JSON";
        console.error("Failed to parse injected data:", err);
        return [];
      }
    }

    function clearEntities() {
      const entities = viewer.entities.values.slice();
      for (const entity of entities) {
        viewer.entities.remove(entity);
      }
    }

    function addRainEntities(points) {
      clearEntities();

      points.forEach((p, idx) => {
        const lat = safeNum(p.lat, null);
        const lon = safeNum(p.lon, null);
        if (lat === null || lon === null) return;

        const rain = safeNum(p.rain, 0);
        const height = cylinderLength(rain, p.h);
        const bottomRadius = cylinderBottomRadius(rain);
        const altitude = Math.max(0, safeNum(p.h, 0));

        viewer.entities.add({
          id: `rain-${idx}`,
          position: Cesium.Cartesian3.fromDegrees(lon, lat, altitude),
          cylinder: {
            length: height,
            topRadius: 0,
            bottomRadius: bottomRadius,
            material: safeColor(p),
            outline: false
          },
          description: `
            <div><strong>Rainfall:</strong> ${rain.toFixed(1)} mm</div>
            <div><strong>Lat:</strong> ${lat.toFixed(4)}</div>
            <div><strong>Lon:</strong> ${lon.toFixed(4)}</div>
            <div><strong>Height:</strong> ${height.toFixed(0)} m</div>
          `
        });
      });

      statusEl.textContent = `${points.length} rainfall points loaded`;
    }

    function fitCameraToIndia() {
      viewer.camera.flyTo({
        destination: Cesium.Cartesian3.fromDegrees(76.0, 14.0, 1800000),
        orientation: {
          heading: Cesium.Math.toRadians(0),
          pitch: Cesium.Math.toRadians(-45),
          roll: 0
        }
      });
    }

    function setTextureFallbackIfNeeded() {
      const hasInjectedTexture = injectedTexture && injectedTexture !== "/*_INJECT_TEXTURE_*/";
      if (!hasInjectedTexture) {
        statusEl.textContent = "No injected texture provided; using default imagery";
      }
    }

    function init() {
      setTextureFallbackIfNeeded();
      const points = parsePoints();
      addRainEntities(points);
      fitCameraToIndia();
    }

    init();
  </script>
</body>
</html>

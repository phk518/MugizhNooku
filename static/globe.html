<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Interactive Globe</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Space+Mono:ital@0;1&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            overflow: hidden;
            background: #000;
            font-family: 'Space Mono', monospace;
            color: #fff;
            cursor: grab;
        }
        body:active { cursor: grabbing; }

        canvas { display: block; }

        /* ── Loading Screen ── */
        #loading-screen {
            position: fixed; inset: 0;
            background: #000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
            transition: opacity 0.8s ease, visibility 0.8s ease;
        }
        #loading-screen.hidden { opacity: 0; visibility: hidden; }

        .loader-title {
            font-family: 'Orbitron', monospace;
            font-size: clamp(1rem, 3vw, 1.6rem);
            font-weight: 700;
            letter-spacing: 0.3em;
            color: #7ecfff;
            text-transform: uppercase;
            margin-bottom: 2rem;
            text-shadow: 0 0 20px rgba(126,207,255,0.5);
        }

        .loader-bar-wrap {
            width: 200px;
            height: 2px;
            background: rgba(255,255,255,0.1);
            border-radius: 2px;
            overflow: hidden;
            margin-bottom: 1rem;
        }
        .loader-bar {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #1a6fff, #7ecfff);
            border-radius: 2px;
            animation: loadBar 1.8s ease forwards;
        }
        @keyframes loadBar {
            0%   { width: 0%; }
            60%  { width: 80%; }
            100% { width: 100%; }
        }

        .loader-sub {
            font-size: 0.65rem;
            letter-spacing: 0.25em;
            color: rgba(255,255,255,0.3);
        }

        /* ── HUD Overlays ── */
        #hud {
            position: fixed; inset: 0;
            pointer-events: none;
            z-index: 10;
        }

        /* Corner brackets */
        .corner {
            position: absolute;
            width: 40px; height: 40px;
            border-color: rgba(126,207,255,0.35);
            border-style: solid;
        }
        .corner.tl { top: 20px; left: 20px;  border-width: 1px 0 0 1px; }
        .corner.tr { top: 20px; right: 20px; border-width: 1px 1px 0 0; }
        .corner.bl { bottom: 20px; left: 20px;  border-width: 0 0 1px 1px; }
        .corner.br { bottom: 20px; right: 20px; border-width: 0 1px 1px 0; }

        /* Title plate */
        .hud-title {
            position: absolute;
            top: 28px; left: 50%;
            transform: translateX(-50%);
            font-family: 'Orbitron', monospace;
            font-size: 0.7rem;
            font-weight: 700;
            letter-spacing: 0.4em;
            color: rgba(126,207,255,0.7);
            text-transform: uppercase;
            white-space: nowrap;
        }

        /* Bottom status bar */
        .hud-status {
            position: absolute;
            bottom: 28px; left: 50%;
            transform: translateX(-50%);
            font-size: 0.6rem;
            letter-spacing: 0.2em;
            color: rgba(255,255,255,0.25);
            white-space: nowrap;
        }

        /* Lat/Lon readout */
        .hud-coords {
            position: absolute;
            bottom: 28px; right: 32px;
            text-align: right;
        }
        .hud-coords span {
            display: block;
            font-size: 0.6rem;
            letter-spacing: 0.15em;
            color: rgba(126,207,255,0.45);
            line-height: 1.6;
        }

        /* Scanline texture */
        body::after {
            content: '';
            position: fixed; inset: 0;
            background: repeating-linear-gradient(
                0deg,
                transparent,
                transparent 2px,
                rgba(0,0,0,0.03) 2px,
                rgba(0,0,0,0.03) 4px
            );
            pointer-events: none;
            z-index: 5;
        }
    </style>
</head>
<body>

    <!-- Loading screen -->
    <div id="loading-screen">
        <div class="loader-title">Terra Viewer</div>
        <div class="loader-bar-wrap"><div class="loader-bar"></div></div>
        <div class="loader-sub" id="loader-text">Initialising 3D Assets...</div>
    </div>

    <!-- HUD -->
    <div id="hud">
        <div class="corner tl"></div>
        <div class="corner tr"></div>
        <div class="corner bl"></div>
        <div class="corner br"></div>
        <div class="hud-title">Earth — Sol III</div>
        <div class="hud-status">Drag to rotate &nbsp;·&nbsp; Scroll to zoom</div>
        <div class="hud-coords">
            <span id="coord-lat">LAT —°</span>
            <span id="coord-lon">LON —°</span>
            <span id="coord-rain" style="color: #7ecfff; font-weight: bold; margin-top: 8px;">RAIN — mm</span>
        </div>
    </div>

    <script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
    }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        // ── Scene ──────────────────────────────────────────────
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(60, innerWidth / innerHeight, 0.1, 1000);
        camera.position.z = 2.8;

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(innerWidth, innerHeight);
        renderer.setPixelRatio(devicePixelRatio);
        document.body.appendChild(renderer.domElement);

        // ── Earth ──────────────────────────────────────────────
        const textureLoader = new THREE.TextureLoader();
        const earthGroup = new THREE.Group();
        scene.add(earthGroup);

        const earthTexture = textureLoader.load(
            'https://raw.githubusercontent.com/mrdoob/three.js/master/examples/textures/planets/earth_atmos_2048.jpg',
            () => {
                const screen = document.getElementById('loading-screen');
                if (screen) screen.classList.add('hidden');
                renderRainData();
            }
        );

        const earth = new THREE.Mesh(
            new THREE.SphereGeometry(1, 64, 64),
            new THREE.MeshPhongMaterial({
                map: earthTexture,
                specular: new THREE.Color(0x334455),
                shininess: 20
            })
        );
        earthGroup.add(earth);

        // ── Atmosphere ─────────────────────────────────────────
        const atmos = new THREE.Mesh(
            new THREE.SphereGeometry(1.04, 64, 64),
            new THREE.MeshPhongMaterial({
                color: 0x4fa1c6,
                transparent: true,
                opacity: 0.13,
                side: THREE.BackSide,
                blending: THREE.AdditiveBlending,
                depthWrite: false
            })
        );
        scene.add(atmos);

        // Outer glow ring
        const glowMesh = new THREE.Mesh(
            new THREE.SphereGeometry(1.08, 64, 64),
            new THREE.MeshPhongMaterial({
                color: 0x1a6fff,
                transparent: true,
                opacity: 0.04,
                side: THREE.BackSide,
                blending: THREE.AdditiveBlending,
                depthWrite: false
            })
        );
        scene.add(glowMesh);

        // ── Starfield ──────────────────────────────────────────
        const starCount = 3000;
        const starPos = new Float32Array(starCount * 3);
        for (let i = 0; i < starCount * 3; i++) starPos[i] = (Math.random() - 0.5) * 120;

        const starGeo = new THREE.BufferGeometry();
        starGeo.setAttribute('position', new THREE.BufferAttribute(starPos, 3));
        const stars = new THREE.Points(starGeo, new THREE.PointsMaterial({ color: 0xffffff, size: 0.06, transparent: true, opacity: 0.75 }));
        scene.add(stars);

        // ── Lights ─────────────────────────────────────────────
        scene.add(new THREE.AmbientLight(0x445577, 0.8)); // Brighter ambient
        
        // Attach a directional light to the camera so the side you look at is ALWAYS brightly lit
        const cameraLight = new THREE.DirectionalLight(0xffffff, 1.5);
        camera.add(cameraLight);
        scene.add(camera); // Must add camera to scene for its light to work

        // ── Controls ───────────────────────────────────────────
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.04;
        controls.enablePan = false;
        controls.minDistance = 1.1;
        controls.maxDistance = 5.5;
        controls.autoRotate = false; // Stop auto-rotation so India stays in focus

        // ── Coordinate Math ────────────────────────────────────
        function latLonToVector3(lat, lon, radius) {
            // Standard Three.js SphereGeometry equirectangular mapping formula
            const phi   = (90 - lat) * (Math.PI / 180);
            const theta = (lon + 180) * (Math.PI / 180);

            const x = -(radius * Math.sin(phi) * Math.cos(theta));
            const z = (radius * Math.sin(phi) * Math.sin(theta));
            const y = (radius * Math.cos(phi));

            return new THREE.Vector3(x, y, z);
        }

        // ── Data Injection ─────────────────────────────────────
        const rainMeshes = [];
        
        function renderRainData() {
            // We will inject a JSON string here from Python via string replace
            const dataStr = `/*_INJECT_DATA_*/`;
            
            let data = [];
            try {
                if (dataStr !== '/*_INJECT_DATA_*/') {
                    data = JSON.parse(dataStr);
                }
            } catch(e) {
                console.error("Data parse error", e);
            }
            
            data.forEach(p => {
                const radius = 1.0;
                const pos = latLonToVector3(p.lat, p.lon, radius);
                
                // Scale cylinder height
                const cylinderHeight = Math.max(p.rain * 0.005, 0.01); // Ensure minimum visible height
                const geometry = new THREE.CylinderGeometry(0.002, 0.002, cylinderHeight, 5);
                geometry.translate(0, cylinderHeight / 2, 0);

                const material = new THREE.MeshBasicMaterial({ 
                    color: new THREE.Color(`rgb(${p.r}, ${p.g}, ${p.b})`),
                    transparent: true,
                    opacity: 0.9
                });
                
                const mesh = new THREE.Mesh(geometry, material);
                mesh.position.copy(pos);
                mesh.quaternion.setFromUnitVectors(new THREE.Vector3(0, 1, 0), pos.clone().normalize());
                
                mesh.userData = { rain: p.rain, lat: p.lat, lon: p.lon };
                rainMeshes.push(mesh);
                earthGroup.add(mesh);
            });

            // Always focus camera on India (Lat 20, Lon 78)
            const indiaPos = latLonToVector3(20, 78, 2.0);
            const surfacePos = latLonToVector3(20, 78, 0);
            camera.position.copy(indiaPos);
            controls.target.copy(surfacePos);
            controls.update();
        }

        // ── HUD coord readout ──────────────────────────────────
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();
        const latEl  = document.getElementById('coord-lat');
        const lonEl  = document.getElementById('coord-lon');
        const rainEl = document.getElementById('coord-rain');

        window.addEventListener('mousemove', e => {
            mouse.x =  (e.clientX / innerWidth)  * 2 - 1;
            mouse.y = -(e.clientY / innerHeight) * 2 + 1;
        });

        function updateCoords() {
            raycaster.setFromCamera(mouse, camera);
            
            // 1. Check if hovering over a rain cylinder first
            const rainHits = raycaster.intersectObjects(rainMeshes);
            if (rainHits.length > 0) {
                const d = rainHits[0].object.userData;
                latEl.textContent = `LAT ${d.lat.toFixed(1)}°`;
                lonEl.textContent = `LON ${d.lon.toFixed(1)}°`;
                rainEl.textContent = `RAIN ${d.rain.toFixed(1)} mm`;
                return;
            }

            // 2. Otherwise check Earth surface
            const hits = raycaster.intersectObject(earth);
            if (hits.length > 0) {
                const p = hits[0].point.clone().normalize();
                const localP = p.clone().applyMatrix4(earthGroup.matrixWorld.clone().invert());

                // Inverse formula for lat/lon
                const lat = 90 - (Math.acos(localP.y) * 180 / Math.PI);
                let lon = (Math.atan2(localP.z, -localP.x) * 180 / Math.PI) - 180;
                if (lon < -180) lon += 360;

                latEl.textContent = `LAT ${lat.toFixed(1)}°`;
                lonEl.textContent = `LON ${lon.toFixed(1)}°`;
                rainEl.textContent = `RAIN — mm`;
            } else {
                latEl.textContent = `LAT —°`;
                lonEl.textContent = `LON —°`;
                rainEl.textContent = `RAIN — mm`;
            }
        }

        // ── Animate ────────────────────────────────────────────
        const clock = new THREE.Clock();
        function animate() {
            requestAnimationFrame(animate);
            const dt = clock.getDelta();

            earthGroup.rotation.y += 0.05 * dt; // Slow earth rotation
            stars.rotation.y  -= 0.008 * dt;
            atmos.rotation.y  += 0.01 * dt;

            updateCoords();
            controls.update();
            renderer.render(scene, camera);
        }
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = innerWidth / innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(innerWidth, innerHeight);
        });
    </script>
</body>
</html>
